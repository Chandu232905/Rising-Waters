<!DOCTYPE html>
<html>
<head>
    <title>Rising Waters - Flood Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🌊 Rising Waters</h1>

    <h2>Flood Prediction System</h2>

    <form action="/predict" method="POST">

        <label>Annual Rainfall</label>
        <input type="number" step="any" name="annual_rainfall" required>

        <label>Monsoon Rainfall</label>
        <input type="number" step="any" name="monsoon_rainfall" required>

        <label>Cloud Visibility (km)</label>
        <input type="number" step="any" name="cloud_visibility" required>

        <label>Humidity (%)</label>
        <input type="number" step="any" name="humidity" required>

        <label>River Level Index</label>
        <input type="number" step="any" name="river_level" required>

        <br><br>

        <button type="submit">Predict Flood</button>

    </form>

</div>

</body>
</html>
